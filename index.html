<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>글쓰기도우미 Lite</title>
<link rel="stylesheet" href="style.css">
<script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
<div id="loginOverlay" class="login-overlay">
  <div class="login-box">
    <p class="login-sub">웹툰 전공 스토리 제작 도구</p>
    <h1>✍️ 글쓰기도우미 <span class="lite">Lite</span></h1>
    <p class="login-desc">구글로 로그인하면 작업 내용이 구글 드라이브에<br>자동 저장되어 어디서든 이어서 쓸 수 있습니다.</p>
    <button id="overlayLoginBtn">Google로 로그인</button>
  </div>
</div>
<header class="topbar">
  <h1>✍️ 글쓰기도우미 <span class="lite">Lite</span></h1>
  <div class="proj-controls">
    <select id="projSelect" title="프로젝트 선택"></select>
    <button id="newProjBtn" title="새 프로젝트">＋ 새 작품</button>
    <button id="renameProjBtn" title="이름 변경">✎</button>
    <button id="delProjBtn" title="삭제">🗑</button>
    <span id="saveStatus" class="save-status">저장됨</span>
  </div>
  <div class="google-auth">
    <button id="googleLoginBtn">Google로 로그인</button>
    <span id="driveStatus" class="save-status">로컬 저장</span>
  </div>
</header>
