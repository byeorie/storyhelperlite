<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스토리헬퍼 Lite</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="topbar">
  <h1>📖 스토리헬퍼 <span class="lite">Lite</span></h1>
  <div class="proj-controls">
    <select id="projSelect" title="프로젝트 선택"></select>
    <button id="newProjBtn" title="새 프로젝트">＋ 새 작품</button>
    <button id="renameProjBtn" title="이름 변경">✎</button>
    <button id="delProjBtn" title="삭제">🗑</button>
    <span id="saveStatus" class="save-status">저장됨</span>
  </div>
</header>

<nav class="tabs">
  <button class="tab active" data-tab="character">① 캐릭터</button>
  <button class="tab" data-tab="world">② 세계관</button>
  <button class="tab" data-tab="background">③ 배경</button>
  <button class="tab" data-tab="event">④ 사건</button>
  <button class="tab" data-tab="plot">⑤ 플롯(영웅의 여정)</button>
  <button class="tab" data-tab="ai">⑥ AI 도움</button>
  <button class="tab" data-tab="export">⑦ 내보내기</button>
</nav>

<main id="app"></main>

<footer class="foot">스토리헬퍼 Lite · 데이터는 이 브라우저에만 저장됩니다 · <a href="#" id="aboutLink">정보</a></footer>

<script src="data.js"></script>
<script src="gemini.js"></script>
<script src="app.js"></script>
</body>
</html>
