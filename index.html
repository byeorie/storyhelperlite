<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>글쓰기도우미</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html-docx-js/dist/html-docx.js"></script>
</head>
<body>
<div id="loginOverlay" class="login-overlay">
  <div class="login-box">
    <p class="login-sub">웹툰 전공 스토리 제작 도구</p>
    <h1><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/></svg> 글쓰기도우미</h1>

    <div class="auth-tabs">
      <button type="button" class="auth-tab active" data-panel="loginPanel">로그인</button>
      <button type="button" class="auth-tab" data-panel="signupPanel">회원가입</button>
    </div>

    <form id="loginPanel" class="auth-panel">
      <input type="text" id="loginUsername" placeholder="아이디" autocomplete="username" required>
      <input type="password" id="loginPassword" placeholder="비밀번호" autocomplete="current-password" required>
      <button type="submit" class="btn auth-submit">로그인</button>
      <p class="auth-error" id="loginError"></p>
      <a href="#" id="findAccountLink" class="auth-link">아이디 / 비밀번호를 잊으셨나요?</a>
    </form>

    <form id="signupPanel" class="auth-panel" hidden>
      <input type="text" id="signupSchool" placeholder="소속 학교" required>
      <input type="text" id="signupName" placeholder="이름" required>
      <input type="text" id="signupUsername" placeholder="아이디" autocomplete="username" required>
      <input type="password" id="signupPassword" placeholder="비밀번호 (6자 이상)" autocomplete="new-password" required>
      <input type="password" id="signupPasswordConfirm" placeholder="비밀번호 확인" autocomplete="new-password" required>
      <input type="email" id="signupEmail" placeholder="이메일 (아이디/비밀번호 찾기용)" autocomplete="email" required>
      <button type="submit" class="btn auth-submit">가입하기</button>
      <p class="auth-error" id="signupError"></p>
    </form>

    <form id="findPanel" class="auth-panel" hidden>
      <p class="login-desc">가입 시 등록한 이메일을 입력하면 계정 확인을 도와드립니다.</p>
      <input type="email" id="findEmail" placeholder="가입한 이메일" required>
      <button type="submit" class="btn auth-submit">확인</button>
      <p class="auth-error" id="findResult"></p>
      <a href="#" id="backToLoginLink" class="auth-link">← 로그인으로 돌아가기</a>
    </form>
  </div>
</div>
<header class="topbar">
  <h1><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/></svg> 글쓰기도우미</h1>
  <div class="mb-left">
    <button id="newProjBtn" class="mb-icon" title="새 작품"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/><path d="M12 12v6M9 15h6"/></svg></button>
    <button id="manualSaveBtn" class="mb-icon" title="저장"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><path d="M17 21v-8H7v8"/><path d="M7 3v5h7"/></svg></button>
    <button id="topImportBtn" class="mb-icon" title="불러오기 (.story)"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5h5l2 2h7a2 2 0 0 1 2 2v2H2V7a2 2 0 0 1 2-2z"/><path d="M2 11h20l-1.7 7a2 2 0 0 1-2 1.5H5.7a2 2 0 0 1-2-1.5z"/></svg></button>
    <input type="file" id="topImportInput" accept=".story,.json" style="display:none">
    <div class="mb-export">
      <button id="topExportBtn" class="mb-icon" title="내보내기 (Word / PDF / .story)"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15V3"/><path d="M8 7l4-4 4 4"/><path d="M4 14v5a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-5"/></svg></button>
      <div class="mb-export-menu" id="topExportMenu" hidden>
        <button id="topExportDocx"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/><path d="M9 13h6M9 17h6"/></svg> Word (.docx)</button>
        <button id="topExportPdf"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/></svg> PDF</button>
        <button id="topExportStory"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><path d="M17 21v-8H7v8"/><path d="M7 3v5h7"/></svg> 작품 파일 (.story)</button>
      </div>
    </div>
    <span class="mb-sep"></span>
  </div>
  <div class="proj-controls">
    <select id="projSelect" title="프로젝트 선택"></select>
    <button id="renameProjBtn" class="mb-icon" title="이름 변경"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/></svg></button>
    <button id="delProjBtn" class="mb-icon" title="삭제"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg></button>
    <span id="saveStatus" class="save-status">저장됨</span>
  </div>
  <div class="user-auth">
    <div class="user-menu-wrap">
      <button id="userMenuBtn" class="avatar-btn" hidden></button>
      <div id="userMenu" class="user-menu" hidden>
        <div class="user-menu-email" id="userMenuInfo"></div>
        <button id="menuSettingsBtn"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg> 설정</button>
        <button id="menuLogoutBtn">로그아웃</button>
      </div>
    </div>
    <span id="serverStatus" class="save-status">로컬 저장</span>
  </div>
</header>

<div class="layout">
  <nav class="sidebar">
    <div class="nav-group">
      <div class="nav-label"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2a7 7 0 0 0-7 7c0 3 1.8 4.5 2.8 6s1.2 2 1.2 3h6c0-1 .2-1.5 1.2-3s2.8-3 2.8-6a7 7 0 0 0-7-7z"/></svg> 아이디어</div>
      <button class="tab active" data-tab="idea">아이디어 수집</button>
      <button class="tab" data-tab="explore">아이디어 탐색</button>
    </div>
    <div class="nav-group">
      <div class="nav-label"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg> 설정</div>
      <button class="tab" data-tab="character">캐릭터 설정</button>
      <button class="tab" data-tab="background">배경 설정</button>
      <button class="tab" data-tab="event">사건 설정</button>
    </div>
    <div class="nav-group">
      <div class="nav-label"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg> 플롯</div>
      <button class="tab" data-tab="plot">플롯 생성</button>
    </div>
    <div class="nav-group">
      <div class="nav-label"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/></svg> 글쓰기</div>
      <button class="tab" data-tab="write">글쓰기</button>
    </div>
    <div class="nav-group" id="adminNavGroup" style="display:none">
      <div class="nav-label"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> 관리자</div>
      <button class="tab" data-tab="admin">작품DB 관리</button>
    </div>
  </nav>

  <main id="app"></main>
</div>

<div id="ctxMenu" class="ctx-menu" hidden></div>
<div id="preview" class="print-preview"></div>
<footer class="foot"><a href="#" id="aboutLink">글쓰기도우미</a> · 웹툰 전공 스토리 제작 도구 · <a href="privacy.html">개인정보처리방침</a></footer>
<script src="data.js"></script>
<script src="auth.js"></script>
<script src="app.js"></script>
</body>
</html>
