<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>글쓰기도우미</title>
<link rel="stylesheet" href="style.css">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
<div id="loginOverlay" class="login-overlay">
  <div class="login-box">
    <p class="login-sub">웹툰 전공 스토리 제작 도구</p>
    <h1>✍️ 글쓰기도우미</h1>
    <p class="login-desc">구글로 로그인하면 작업 내용이 구글 드라이브에<br>자동 저장되어 어디서든 이어서 쓸 수 있습니다.</p>
    <button id="overlayLoginBtn">Google로 로그인</button>
  </div>
</div>
<header class="topbar">
  <h1>✍️ 글쓰기도우미</h1>
  <div class="proj-controls">
    <select id="projSelect" title="프로젝트 선택"></select>
    <button id="newProjBtn" title="새 프로젝트">＋ 새 작품</button>
    <button id="renameProjBtn" title="이름 변경">✎</button>
    <button id="delProjBtn" title="삭제">🗑</button>
    <span id="saveStatus" class="save-status">저장됨</span>
  </div>
  <div class="google-auth">
    <div class="user-menu-wrap">
      <button id="googleLoginBtn">Google로 로그인</button>
      <div id="userMenu" class="user-menu" hidden>
        <div class="user-menu-email" id="userMenuEmail"></div>
        <button id="menuSettingsBtn">⚙ 설정</button>
        <button id="menuLogoutBtn">로그아웃</button>
      </div>
    </div>
    <span id="driveStatus" class="save-status">로컬 저장</span>
  </div>
</header>

<div class="layout">
  <nav class="sidebar">
    <div class="nav-group">
      <div class="nav-label">💡 아이디어</div>
      <button class="tab active" data-tab="idea">아이디어 수집</button>
      <button class="tab" data-tab="explore">아이디어 탐색</button>
    </div>
    <div class="nav-group">
      <div class="nav-label">👤 캐릭터</div>
      <button class="tab" data-tab="character">캐릭터 설정</button>
    </div>
    <div class="nav-group">
      <div class="nav-label">🌍 배경</div>
      <button class="tab" data-tab="world">세계관</button>
      <button class="tab" data-tab="background">배경 설정</button>
    </div>
    <div class="nav-group">
      <div class="nav-label">⚡ 사건</div>
      <button class="tab" data-tab="event">사건 설정</button>
    </div>
    <div class="nav-group">
      <div class="nav-label">📖 플롯</div>
      <button class="tab" data-tab="plot">영웅의 여정</button>
    </div>
    <div class="nav-group">
      <div class="nav-label">기타</div>
      <button class="tab" data-tab="export">내보내기</button>
    </div>
  </nav>

  <main id="app"></main>
</div>

<footer class="foot"><a href="#" id="aboutLink">글쓰기도우미</a> · 웹툰 전공 스토리 제작 도구 · <a href="privacy.html">개인정보처리방침</a></footer>
<script src="data.js"></script>
<script src="google-drive.js"></script>
<script src="app.js"></script>
</body>
</html>
